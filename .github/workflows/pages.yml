name: pages
# GitHub Pages serves this repo from the gh-pages branch (enabling Pages on
# main via API/UI needs permissions this repo's tokens don't have). This job
# keeps gh-pages an exact mirror of main, so main stays the source of truth.
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: git push --force origin HEAD:gh-pages
